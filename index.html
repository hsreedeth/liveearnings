<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shift Earnings Timer</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-red: #ff3b30;
            --button-bg: #e8e8ed;
            --button-text: #1d1d1f;
            --button-disabled: #f5f5f7;
            --button-text-disabled: #d2d2d7;
            --line-color: #d2d2d7;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: "SF Mono", "Menlo", "Monaco", "Courier New", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Layout Container */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Date Header */
        .header-date {
            text-align: right;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1.5fr;
            gap: 20px;
            margin-bottom: 60px;
            align-items: flex-start;
        }

        /* Sections */
        .section-kpi {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .kpi-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .kpi-label {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .kpi-value {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .section-time, .section-earnings {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-time {
            align-items: center;
        }

        .section-earnings {
            align-items: flex-end; /* Right align on desktop */
        }

        .section-label {
            font-size: 24px;
            font-weight: 400;
            color: var(--text-primary);
        }

        .large-value {
            font-size: 80px;
            font-weight: 300; /* Thin/Light */
            line-height: 1;
            letter-spacing: -1px;
            color: #4a4a4a; /* Slightly softer black */
        }

        .time-value {
            font-variant-numeric: tabular-nums;
        }

        /* Timeline */
        .timeline-container {
            margin-bottom: 60px;
            position: relative;
            padding-top: 20px;
        }

        .progress-track {
            position: relative;
            height: 20px; /* Hit area */
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }

        .progress-line-bg {
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background-color: transparent; /* Invisible track */
            transform: translateY(-50%);
        }

        .progress-line-fill {
            position: absolute;
            left: 0;
            top: 50%;
            height: 3px;
            background-color: var(--accent-red);
            transform: translateY(-50%);
            width: 0%; /* Dynamic */
            transition: width 0.2s linear;
        }

        .progress-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: var(--accent-red);
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0%; /* Dynamic */
            transition: left 0.2s linear;
        }

        .progress-label {
            position: absolute;
            left: 16px; /* Offset from dot */
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        /* Axis */
        .axis-container {
            text-align: center;
            position: relative;
        }

        .axis-label-top {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: inline-block;
            background: var(--bg-color);
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }

        .axis-line {
            border-top: 1px dashed var(--line-color);
            width: 100%;
            position: absolute;
            top: 15px; /* Adjust to align with center of label if needed, or below */
            left: 0;
            z-index: 0;
        }
        
        /* Adjust axis line to be below the label */
        .axis-line-wrapper {
            position: relative;
            height: 1px;
            margin-bottom: 16px;
        }
        
        .axis-line-wrapper .axis-line {
            top: 0;
        }

        .axis-ticks {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 12px;
        }

        .tick-item {
            position: relative;
            text-align: center;
            min-width: 60px;
        }
        
        .tick-item:first-child { text-align: left; }
        .tick-item:last-child { text-align: right; }

        .tick-sublabel {
            display: block;
            font-size: 12px;
            margin-top: 4px;
            color: var(--text-secondary);
            opacity: 0.8;
        }

        /* Controls */
        .controls-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: auto;
        }

        .button-row {
            display: grid;
            gap: 20px;
        }

        .row-1 {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .row-2 {
            grid-template-columns: 1fr 1fr;
            width: 66.66%; /* Match width of first 2 buttons of row 1 roughly */
        }

        button {
            background-color: var(--button-bg);
            border: none;
            border-radius: 12px;
            padding: 24px;
            font-size: 18px;
            color: var(--button-text);
            cursor: pointer;
            transition: opacity 0.2s, background-color 0.2s;
            font-family: var(--font-main);
            font-weight: 400;
        }

        button:active {
            opacity: 0.7;
        }

        button:disabled {
            background-color: var(--button-disabled);
            color: var(--button-text-disabled);
            cursor: not-allowed;
            pointer-events: none; /* Strict disable */
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .modal-title {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-family: var(--font-main);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            font-size: 16px;
        }

        .btn-primary {
            background-color: #007aff;
            color: white;
        }
        
        .btn-cancel {
            background-color: var(--button-bg);
        }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            .container {
                padding: 16px;
            }

            .header-date {
                text-align: left;
                margin-bottom: 30px;
                font-size: 13px;
            }

            .main-grid {
                grid-template-columns: 1fr;
                gap: 40px;
                margin-bottom: 40px;
            }

            /* Mobile Order: Earnings, Time, KPI */
            .section-earnings {
                order: 1;
                align-items: flex-start; /* Left align on mobile */
            }

            .section-time {
                order: 2;
                align-items: flex-start;
            }

            .section-kpi {
                order: 3;
                flex-direction: row;
                justify-content: space-between;
                margin-top: 10px;
            }

            .large-value {
                font-size: 64px;
            }

            .section-label {
                font-size: 20px;
            }

            .progress-track {
                margin-bottom: 30px;
            }
            
            .timeline-container {
                margin-bottom: 40px;
            }

            .controls-container {
                gap: 12px;
            }

            .row-1, .row-2 {
                grid-template-columns: 1fr;
                width: 100%;
            }
            
            /* On mobile, stack buttons. Start/Pause/End in one group, Setup in another */
            .button-row {
                gap: 12px;
            }
            
            /* Specific mobile button styling to match "big buttons" */
            button {
                padding: 20px;
                font-size: 18px;
                border-radius: 16px;
            }
        }
        
        /* Utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-date" id="headerDate">Loading...</div>

    <div class="main-grid">
        <!-- KPI Section (Left on Desktop, Bottom on Mobile) -->
        <div class="section-kpi">
            <div class="kpi-item">
                <div class="kpi-label">Hourly Rate</div>
                <div class="kpi-value" id="dispRate">$0.00</div>
            </div>
            <div class="kpi-item">
                <div class="kpi-label">Earning Speed</div>
                <div class="kpi-value" id="dispSpeed">$0.0000 per second</div>
            </div>
        </div>

        <!-- Time Worked (Center on Desktop, Middle on Mobile) -->
        <div class="section-time">
            <div class="section-label">Time Worked</div>
            <div class="large-value time-value" id="dispTime">00:00:00</div>
        </div>

        <!-- Live Earnings (Right on Desktop, Top on Mobile) -->
        <div class="section-earnings">
            <div class="section-label">Live Earnings</div>
            <div class="large-value" id="dispEarnings">$0.00</div>
        </div>
    </div>

    <div class="timeline-container">
        <div class="progress-track">
            <div class="progress-line-bg"></div>
            <div class="progress-line-fill" id="progressFill"></div>
            <div class="progress-dot" id="progressDot">
                <div class="progress-label" id="progressLabel"></div>
            </div>
        </div>

        <div class="axis-container">
            <div class="axis-label-top">TIME</div>
            <div class="axis-line-wrapper">
                <div class="axis-line"></div>
            </div>
            <div class="axis-ticks">
                <div class="tick-item">
                    <span id="tickStart">9:30 AM</span>
                    <span class="tick-sublabel">Shift start</span>
                </div>
                <div class="tick-item" id="tickMid1">12:30 PM</div>
                <div class="tick-item" id="tickMid2">3:30 PM</div>
                <div class="tick-item" id="tickEnd">6.30 PM</div>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <div class="button-row row-1">
            <button id="btnStart">Start Shift</button>
            <button id="btnPause">Pause</button>
            <button id="btnEnd">End & Reset</button>
        </div>
        <div class="button-row row-2">
            <button id="btnSetRate">Enter Base Hourly Rate</button>
            <button id="btnSetTime">Enter Start Time</button>
        </div>
    </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modalRate">
    <div class="modal-content">
        <div class="modal-title">Enter Hourly Rate</div>
        <input type="number" class="modal-input" id="inputRate" placeholder="0.00" step="0.01">
        <div class="modal-actions">
            <button class="modal-btn btn-cancel" onclick="closeModal('modalRate')">Cancel</button>
            <button class="modal-btn btn-primary" onclick="saveRate()">Save</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalTime">
    <div class="modal-content">
        <div class="modal-title">Enter Start Time</div>
        <input type="time" class="modal-input" id="inputTime">
        <div class="modal-actions">
            <button class="modal-btn btn-cancel" onclick="closeModal('modalTime')">Cancel</button>
            <button class="modal-btn btn-primary" onclick="saveStartTime()">Save</button>
        </div>
    </div>
</div>

<script>
    // --- State Management ---
    const STORAGE_KEY = 'shift_timer_state';
    const PLANNED_HOURS = 9.0;

    let state = {
        dayKey: null,
        baseHourlyRate: 0,
        startTimeHHMM: null,
        startDateTimeMs: null,
        running: false,
        workedMsAccumulated: 0,
        lastResumeEpochMs: 0,
        hasInitializedToday: false
    };

    // --- DOM Elements ---
    const els = {
        date: document.getElementById('headerDate'),
        rate: document.getElementById('dispRate'),
        speed: document.getElementById('dispSpeed'),
        time: document.getElementById('dispTime'),
        earnings: document.getElementById('dispEarnings'),
        progressFill: document.getElementById('progressFill'),
        progressDot: document.getElementById('progressDot'),
        progressLabel: document.getElementById('progressLabel'),
        tickStart: document.getElementById('tickStart'),
        tickMid1: document.getElementById('tickMid1'),
        tickMid2: document.getElementById('tickMid2'),
        tickEnd: document.getElementById('tickEnd'),
        btnStart: document.getElementById('btnStart'),
        btnPause: document.getElementById('btnPause'),
        btnEnd: document.getElementById('btnEnd'),
        btnSetRate: document.getElementById('btnSetRate'),
        btnSetTime: document.getElementById('btnSetTime'),
        modalRate: document.getElementById('modalRate'),
        modalTime: document.getElementById('modalTime'),
        inputRate: document.getElementById('inputRate'),
        inputTime: document.getElementById('inputTime')
    };

    // --- Initialization ---
    function init() {
        loadState();
        checkDayBoundary();
        setupEventListeners();
        requestAnimationFrame(loop);
    }

    function getDayKey() {
        // Use local date string YYYY-MM-DD
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function loadState() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const parsed = JSON.parse(stored);
                state = { ...state, ...parsed };
            }
        } catch (e) {
            console.error('Failed to load state', e);
        }
    }

    function saveState() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (e) {
            console.error('Failed to save state', e);
        }
    }

    function checkDayBoundary() {
        const currentDayKey = getDayKey();
        
        // If it's a new day
        if (state.dayKey !== currentDayKey) {
            // If running, we might want to keep it (edge case mentioned in requirements)
            // "Minimal acceptable: keep running state as-is and bypass gating until user ends/reset"
            if (state.running) {
                // Do nothing, let it run. Update dayKey only when reset? 
                // Or update dayKey but keep initialized?
                // Requirement: "If dayKey changes (new day) and no active running shift, force hasInitializedToday = false"
                // So if running, we DON'T force false.
                // We should probably update dayKey to current to avoid repeated checks, 
                // but keep hasInitializedToday = true.
                state.dayKey = currentDayKey; 
                // Keep other state
            } else {
                // Not running, so reset for new day
                resetStateForNewDay(currentDayKey);
            }
            saveState();
        }
    }

    function resetStateForNewDay(dayKey) {
        state = {
            dayKey: dayKey,
            baseHourlyRate: state.baseHourlyRate, // Keep rate preference? Usually yes.
            startTimeHHMM: null,
            startDateTimeMs: null,
            running: false,
            workedMsAccumulated: 0,
            lastResumeEpochMs: 0,
            hasInitializedToday: false
        };
        // If we want to force re-entry of rate:
        // state.baseHourlyRate = 0; 
        // Requirement: "The only actionable setup must be: Enter Base Hourly Rate, Enter Start Time"
        // This implies we might need to re-enter. Let's keep it 0 to force entry if that's the strict "First Visit" rule.
        // "Once the user has entered both base rate + start time for that day..."
        // I will clear rate to be safe and strict.
        state.baseHourlyRate = 0;
    }

    // --- Core Logic ---
    function getWorkedMs() {
        let ms = state.workedMsAccumulated;
        if (state.running) {
            ms += (Date.now() - state.lastResumeEpochMs);
        }
        return Math.max(0, ms);
    }

    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function formatCurrency(val) {
        return '$' + val.toFixed(2);
    }

    function formatSpeed(val) {
        return '$' + val.toFixed(4);
    }

    function formatTimeLabel(date) {
        // 1:46 PM
        let h = date.getHours();
        const m = date.getMinutes();
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12;
        h = h ? h : 12; // the hour '0' should be '12'
        return `${h}:${String(m).padStart(2, '0')} ${ampm}`;
    }
    
    function formatTimeLabelFromDate(d) {
        return formatTimeLabel(d);
    }
    
    function formatAxisTime(d) {
        // 9:30 AM or 6.30 PM (match punctuation)
        let h = d.getHours();
        const m = d.getMinutes();
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12;
        h = h ? h : 12;
        
        // Check for 6:30 PM case to use dot
        const is630 = (h === 6 && m === 30 && ampm === 'PM');
        const sep = is630 ? '.' : ':';
        
        return `${h}${sep}${String(m).padStart(2, '0')} ${ampm}`;
    }

    // --- Render Loop ---
    function loop() {
        const now = new Date();
        
        // 1. Header Date
        // Sat, Feb 28, 2026 at 06:40:56
        const dateOptions = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
        const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
        els.date.textContent = `${now.toLocaleDateString('en-US', dateOptions)} at ${timeStr}`;

        // 2. Computed Values
        const workedMs = getWorkedMs();
        const earnings = (state.baseHourlyRate / 3600000) * workedMs;
        const speed = state.baseHourlyRate / 3600;

        els.time.textContent = formatTime(workedMs);
        els.earnings.textContent = formatCurrency(earnings);
        els.rate.textContent = formatCurrency(state.baseHourlyRate);
        els.speed.textContent = formatSpeed(speed) + ' per second';

        // 3. Progress Bar
        if (state.startDateTimeMs) {
            const start = state.startDateTimeMs;
            const end = start + (PLANNED_HOURS * 3600000);
            const current = now.getTime();
            
            let pct = (current - start) / (end - start);
            pct = Math.max(0, Math.min(1, pct));
            
            els.progressFill.style.width = (pct * 100) + '%';
            els.progressDot.style.left = (pct * 100) + '%';
            els.progressLabel.textContent = formatTimeLabel(now);
            
            // Update Axis Labels based on start time
            // Only need to do this when start time changes, but doing it here is safe
            const dStart = new Date(start);
            els.tickStart.textContent = formatAxisTime(dStart);
            
            const dMid1 = new Date(start + 3 * 3600000);
            els.tickMid1.textContent = formatAxisTime(dMid1);
            
            const dMid2 = new Date(start + 6 * 3600000);
            els.tickMid2.textContent = formatAxisTime(dMid2);
            
            const dEnd = new Date(start + 9 * 3600000);
            els.tickEnd.textContent = formatAxisTime(dEnd);
        } else {
            els.progressFill.style.width = '0%';
            els.progressDot.style.left = '0%';
            els.progressLabel.textContent = '';
            // Default axis labels? Or keep empty? 
            // Prototype shows labels. Let's default to 9:30 AM start if not set, or just hide?
            // Better to show defaults matching screenshot: 9:30, 12:30, 3:30, 6.30
            if (!state.hasInitializedToday) {
                 els.tickStart.textContent = "9:30 AM";
                 els.tickMid1.textContent = "12:30 PM";
                 els.tickMid2.textContent = "3:30 PM";
                 els.tickEnd.textContent = "6.30 PM";
            }
        }

        // 4. Controls State (Gating)
        updateControlsState();

        requestAnimationFrame(loop);
    }

    function updateControlsState() {
        const isSetup = state.hasInitializedToday && state.baseHourlyRate > 0 && state.startDateTimeMs;
        
        // Setup buttons always enabled
        els.btnSetRate.disabled = false;
        els.btnSetTime.disabled = false;

        if (!isSetup) {
            els.btnStart.disabled = true;
            els.btnPause.disabled = true;
            els.btnEnd.disabled = true;
            els.btnStart.textContent = "Start Shift";
            els.btnPause.textContent = "Pause";
        } else {
            // Setup complete
            if (state.running) {
                // Running
                els.btnStart.disabled = true; // Already started
                els.btnPause.disabled = false;
                els.btnPause.textContent = "Pause";
                els.btnEnd.disabled = false;
            } else {
                // Not running (Paused or Ready to Start)
                if (state.workedMsAccumulated > 0) {
                    // Paused
                    els.btnStart.disabled = true; // Use Resume button
                    els.btnPause.disabled = false;
                    els.btnPause.textContent = "Resume";
                    els.btnEnd.disabled = false;
                } else {
                    // Ready to Start (Fresh)
                    els.btnStart.disabled = false;
                    els.btnStart.textContent = "Start Shift";
                    els.btnPause.disabled = true; // Can't pause if not started
                    els.btnEnd.disabled = false; // Allow reset even if just setup
                }
            }
        }
    }

    // --- Event Handlers ---
    function setupEventListeners() {
        els.btnSetRate.addEventListener('click', () => openModal('modalRate'));
        els.btnSetTime.addEventListener('click', () => openModal('modalTime'));
        
        els.btnStart.addEventListener('click', () => {
            if (!state.running) {
                state.running = true;
                // If this is the first start (no accumulated time), use the set Start Time as the anchor.
                // This fulfills the requirement: "start the Live earnings at calculated amount up until that time"
                if (state.workedMsAccumulated === 0 && state.startDateTimeMs) {
                    state.lastResumeEpochMs = state.startDateTimeMs;
                } else {
                    // Resuming from pause
                    state.lastResumeEpochMs = Date.now();
                }
                saveState();
            }
        });

        els.btnPause.addEventListener('click', () => {
            if (state.running) {
                // Pause
                state.running = false;
                state.workedMsAccumulated += Date.now() - state.lastResumeEpochMs;
            } else {
                // Resume
                state.running = true;
                state.lastResumeEpochMs = Date.now();
            }
            saveState();
        });

        els.btnEnd.addEventListener('click', () => {
            if (confirm('Are you sure you want to end the shift and reset? This will clear all data.')) {
                // Explicitly reset everything to default
                state = {
                    dayKey: getDayKey(),
                    baseHourlyRate: 0,
                    startTimeHHMM: null,
                    startDateTimeMs: null,
                    running: false,
                    workedMsAccumulated: 0,
                    lastResumeEpochMs: 0,
                    hasInitializedToday: false
                };
                saveState();
            }
        });
    }

    // --- Modal Logic ---
    window.openModal = function(id) {
        document.getElementById(id).classList.add('active');
        if (id === 'modalRate') {
            els.inputRate.value = state.baseHourlyRate || '';
            els.inputRate.focus();
        } else if (id === 'modalTime') {
            els.inputTime.value = state.startTimeHHMM || '';
            els.inputTime.focus();
        }
    };

    window.closeModal = function(id) {
        document.getElementById(id).classList.remove('active');
    };

    window.saveRate = function() {
        const val = parseFloat(els.inputRate.value);
        if (!isNaN(val) && val > 0) {
            state.baseHourlyRate = val;
            checkInitialization();
            saveState();
            closeModal('modalRate');
        } else {
            alert('Please enter a valid rate.');
        }
    };

    window.saveStartTime = function() {
        const val = els.inputTime.value; // HH:MM
        if (val) {
            state.startTimeHHMM = val;
            
            // Compute startDateTimeMs
            const now = new Date();
            const [h, m] = val.split(':').map(Number);
            const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0, 0);
            
            // "When the user enters start time later than current time (accidental), interpret as yesterday only if you already support this... otherwise keep strict today."
            // We keep strict today.
            state.startDateTimeMs = start.getTime();
            
            // Fix: If not running, reset accumulated time so that the next "Start" 
            // will trigger the backdating logic (using the new start time as the anchor).
            if (!state.running) {
                state.workedMsAccumulated = 0;
            }
            
            checkInitialization();
            saveState();
            closeModal('modalTime');
        } else {
            alert('Please enter a valid time.');
        }
    };

    function checkInitialization() {
        if (state.baseHourlyRate > 0 && state.startDateTimeMs) {
            state.hasInitializedToday = true;
        }
    }

    // Start
    init();

</script>
</body>
</html>
